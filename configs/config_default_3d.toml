[wandb]
project_name = 'posetail-test' # 'posetail-big-triplane-tuning'
# path = '/data/results/katie'
path = '/groups/karashchuk/home/ruppk2/results'
mode = 'offline' # 'online', 'offline', 'disabled'


[dataset]
batch_size = 1
# prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-tests/kubric-multiview-subset'
# prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-pretraining'
prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-pretraining-visibility'

[dataset.train]
split_dir = 'train'
n_frames = 16
max_res = 256
cams_to_sample = [2, 6] 
kpts_to_sample = [64, 128] 
aug_prob = 0.25
enable_kpt_filtering = false
cam_thresh_for_vis = 1
balance_datasets = true
n_samples_per_dataset = -1

[dataset.val]
split_dir = 'val'
n_frames = 16
max_res = 288
cams_to_sample = 5
kpts_to_sample = 60
aug_prob = 0.0

[dataset.test]
split_dir = 'test'
n_frames = 16
max_res = 288
project_2d = false


[devices]
device = 'cuda'


[model]
mode_3d = 'triplane' # 'minicubes'

# temporal processing
stride_length = 8
stride_overlap = 4

# resnet
downsample_factor = 4
hiera_requires_grad = false

# cube (only used for 3d)
cube_dim = 64
cube_extent = 15 # kubric
# cube_extent = 500

# correlation
corr_levels = 4 
corr_radius = 3

corr_hidden_dim = 384 
corr_output_dim = 256
# corr_hidden_dim = 1024
# corr_output_dim = 256 
# corr_hidden_dim = 1586
# corr_output_dim = 1024
# corr_hidden_dim = 1024
# corr_output_dim = 512

# triplane 
upsample_factor = 1

# transformer
max_freq = 10
n_iters = 4
embedding_dim = 384
latent_dim = 64 
n_virtual = 64 
n_heads = 8 
n_time_space_blocks = 6
embedding_factor = 4 
vc_head_requires_grad = true


[training]
seed = 3
# checkpoint_path = ''
n_iterations = 50 # 600000
scheduler_type = 'multisteplr' # 'onecyclelr'
max_grad_norm = 1.0
checkpoint_freq = 25 # 20480 # in iterations
eval_metric_freq = 16 # in iterations
val_freq = 16 # in iterations
print_freq = 1 # in iterations
debug_ix = -1 # only works for val 

[training.optimizer]
learning_rate = 1e-4
weight_decay = 1e-5
amsgrad = false

[training.scheduler]
# milestones = []
milestones = [50]
gamma = 0.1
# pct_start = 0.05
# cycle_momentum = false

[training.losses]
gamma = 0.8
pixel_thresh = 9
delta = 6
use_huber_loss = false

# weights for calculating total loss (use 0 to not compute a specific loss)
vis_loss_weight = 1
conf_loss_weight = 1
coords_loss_weight = 0.05
occluded_coords_loss_weight = 0.01
feature_loss_weight = 1.0

