[wandb]
project_name = '3d-tracker-test'
path = '/data/results/katie'
mode = 'online' # 'online', 'offline', 'disabled'


[dataset]
batch_size = 1
enable_keypoint_filtering = false
# prefix = '/nvme1/data/animal-datasets-processed/posetail-tests/offsets/'
prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-tests/kubric-multiview-subset'

[dataset.train]
split = 'train'
n_frames = 16
max_res = 256
cams_to_sample = [5, 6] 
kpts_to_sample = [60, 120] 

[dataset.val]
split = 'val'
n_frames = 16
max_res = 256
cams_to_sample = [5, 6] 
kpts_to_sample = [60, 120] 

[dataset.test]
split = 'test'
n_frames = 16
max_res = 256
project_2d = false


[devices]
device = 'cuda:1'


[model]
track_3d = true
mode_3d = 'triplane' # 'minicubes'

# temporal processing
stride_length = 8
stride_overlap = 4

# resnet
downsample_factor = 2

# cube (only used for 3d)
cube_dim = 64
cube_extent = 5
# cube_extent = 500

# correlation
corr_levels = 4 
corr_radius = 3
corr_hidden_dim = 384
corr_output_dim = 256 

# triplane 
upsample_factor = 1

# transformer
max_freq = 10
n_iters = 4
embedding_dim = 384
latent_dim = 64 
n_virtual = 64 
n_heads = 8 
n_time_space_blocks = 3
embedding_factor = 4 


[training]
seed = 3
n_iterations = 100
scheduler_type = 'multisteplr' # 'onecyclelr'
max_grad_norm = 1
checkpoint_freq = 25 # in iterations
eval_metric_freq = 2 # in iterations
val_freq = 2 # in iterations
print_freq = 1 # in iterations
debug_ix = -1 # only works for val 

[training.optimizer]
learning_rate = 0.00001
weight_decay = 0.000001
amsgrad = true

[training.scheduler]
milestones = [250]
# milestones = [50, 100, 150, 200, 250, 300, 350, 400, 450, 500, 550]
gamma = 0.1
# pct_start = 0.05
# cycle_momentum = false

[training.losses]
gamma = 0.8
pixel_thresh = 9
delta = 6
use_vis_loss = true
use_conf_loss = true
use_huber_loss = false
use_feature_loss = false

# weights for computing total loss 
vis_loss_weight = 2
conf_loss_weight = 1
coords_loss_weight = 1
feature_loss_weight = 0.5