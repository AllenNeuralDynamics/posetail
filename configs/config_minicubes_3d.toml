[wandb]
project_name = 'posetail-finetuning'
# path = '/data/results/lili/posetail'
path = '/groups/karashchuk/home/karashchukl/results/posetail-finetuning'
mode = 'online' # 'online', 'offline', 'disabled'

[dataset]
batch_size = 1
num_workers = 24
# prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-tests/kubric-multiview-subset'
# prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-pretraining'
prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-finetuning'
# prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-finetuning-test'

[dataset.train]
split_dir = 'train'
n_frames = 16
min_res = 256
max_res = 320
cams_to_sample = [1, 9] 
kpts_to_sample = [8, 64]
aug_prob = 0.25
enable_kpt_filtering = true
cam_thresh_for_vis = 1
balance_datasets = true
n_samples_per_dataset = -1

[dataset.val]
split_dir = 'val'
n_frames = 16
max_res = 288
cams_to_sample = 5
kpts_to_sample = 32
aug_prob = 0.0

[dataset.test]
split_dir = 'test'
max_res = 288
n_frames = 16
project_2d = false
aug_prob = 0.0

[devices]
device = 'cuda'


[model]
mode_3d = "minicubes"

hiera_requires_grad = true

# processing
stride_length = 8
stride_overlap = 4
downsample_factor = 2

# cube (only used for triplane)
cube_dim = 64
# cube extent only used for triplane
# cube_extent = 500 # rat7m
cube_extent = 5 # kubric

# correlation
corr_levels = 5
corr_radius = 2
# corr_hidden_dim = 384
# corr_output_dim = 256
# corr_hidden_dim = 256
# corr_output_dim = 128
corr_hidden_dim = 256
corr_output_dim = 128

# corr_hidden_dim = 1024
# corr_output_dim = 512
# corr_hidden_dim = 1586
# corr_output_dim = 1024

# triplane
upsample_factor = 1

# transformer
max_freq = 10
n_iters = 4
embedding_dim = 384
# embedding_dim = 512
latent_dim = 64
n_virtual = 64
n_heads = 8
n_time_space_blocks = 6
embedding_factor = 4
vc_head_requires_grad = true

[training]
seed = 3
# checkpoint_path = ''
n_iterations = 1600000
# scheduler_type = 'multisteplr'
scheduler_type = 'onecyclelr'
max_grad_norm = 1.0
checkpoint_freq = 20480 # in iterations
eval_metric_freq = 16 # in iterations
val_freq = 64 # in iterations
print_freq = 1 # in iterations
debug_ix = -1 # only works for val 

[training.optimizer]
learning_rate = 3e-5
weight_decay = 1e-5
# weight_decay = 0
amsgrad = false

[training.scheduler]
# milestones = [50, 100, 150, 200, 250, 300, 350, 400, 450, 500, 550]
# milestones = []
# gamma = 0.8
# milestones = [200]
# gamma = 0.1
# steps_per_epoch = 218
pct_start = 0.05
cycle_momentum = false

[training.losses]
gamma = 0.8
pixel_thresh = 3
# delta = 0.1
delta = 6
use_huber_loss = false

# weights for calculating total loss (use 0 to not compute a specific loss)
vis_loss_weight = 4
conf_loss_weight = 0.2
coords_loss_weight = 0.10
occluded_coords_loss_weight = 0.01
feature_loss_weight = 1.0
