[wandb]
project_name = 'posetail-tests'
# path = '/data/results/lili/posetail'
path = '/groups/karashchuk/home/karashchukl/results/posetail'
mode = 'online' # 'online', 'offline', 'disabled'

[dataset]
batch_size = 1
# prefix = '/nvme1/data/animal-datasets-processed/posetail-tests/offsets/'
# prefix = '/nvme1/data/animal-datasets-processed/posetail-tests/kubric-multiview-subset/'
# prefix = '/nvme1/data/animal-datasets-processed/kubric-multiview'
# prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/kubric-multiview'
# prefix = '/data/animal-datasets-processed/posetail-tests/single-subject-filtered-3500'
# prefix = '/data/animal-datasets-processed/posetail-tests/single-subject-35000'
# prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/kubric-multiview-subset'
prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-tests/kubric-multiview-subset'

[dataset.train]
split = 'train'
n_frames = 16
max_res = 256
cams_to_sample = [2, 6] 
kpts_to_sample = [60, 120]
aug_prob = 0.0
enable_kpt_filtering = true

[dataset.val]
split = 'val'
n_frames = 16
max_res = 256
cams_to_sample = 5
kpts_to_sample = 60
aug_prob = 0.0

[dataset.test]
split = 'test'
n_frames = 16
project_2d = false


[devices]
device = 'cuda:0'


[model]
track_3d = true
mode_3d = "minicubes"

# processing
stride_length = 8
stride_overlap = 4
downsample_factor = 2

# cube (only used for 3d)
cube_dim = 64
# cube extent only used for triplane
# cube_extent = 500 # rat7m
cube_extent = 50 # kubric

# correlation
corr_levels = 4
corr_radius = 2
# corr_hidden_dim = 384
# corr_output_dim = 256
# corr_output_dim = 125
corr_hidden_dim = 1024
corr_output_dim = 512
# corr_hidden_dim = 1586
# corr_output_dim = 1024

# triplane
upsample_factor = 1

# transformer
max_freq = 10
n_iters = 4
embedding_dim = 384
# embedding_dim = 512
latent_dim = 64
n_virtual = 64
n_heads = 8
n_time_space_blocks = 6
embedding_factor = 4


[training]
seed = 3
n_epochs = 600
scheduler_type = 'multisteplr'
# scheduler_type = 'onecyclelr'
max_grad_norm = 1.0
checkpoint_freq = 100
eval_freq = 1
print_freq = 1
debug_ix = -1

[training.optimizer]
learning_rate = 1e-4
weight_decay = 1e-6
# weight_decay = 0
amsgrad = false

[training.scheduler]
milestones = [50, 100, 150, 200, 250, 300, 350, 400, 450, 500, 550]
gamma = 0.8
# milestones = [200]
# gamma = 0.1
# steps_per_epoch = 218
# pct_start = 0.05
# cycle_momentum = false

[training.losses]
gamma = 0.8
pixel_thresh = 6
# delta = 0.1
delta = 3
use_huber_loss = false
use_feature_loss = false

# weights for computing total loss
vis_loss_weight = 1
conf_loss_weight = 1
coords_loss_weight = 0.05
feature_loss_weight = 1.0
