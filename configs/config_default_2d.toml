[wandb]
project_name = '2d-tracker-test'
path = '/data/results/katie'
mode = 'online' # 'online', 'offline', 'disabled'


[dataset]
batch_size = 1

[dataset.train]
prefix = '/nvme1/data/animal-datasets-processed/posetail'
n_frames = 16
max_res = 256

[dataset.test]
dataset_name = 'rat7m'
prefix = '/nvme1/data/animal-datasets/rat7m'
sub_pattern = 's([5])-d([2])'
n_frames = 16
project_2d = true


[devices]
device = 'cuda:1'


[model]
track_3d = false

# processing
stride_length = 8
stride_overlap = 4

# resnet
downsample_factor = 2

# cube (only used for 3d)
cube_dim = 20
cube_extent = 500

# correlation
corr_levels = 4
corr_radius = 3
corr_hidden_dim = 384 
corr_output_dim = 256

# triplane 
upsample_factor = 1

# transformer
max_freq = 10
n_iters = 4
embedding_dim = 384
latent_dim = 128
encoding_dim = 64
n_virtual = 64 
n_heads = 8
n_time_space_blocks = 3 
embedding_factor = 4 


[training]
seed = 3
n_epochs = 250
scheduler_type = 'multisteplr' # or 'onecyclelr' or null
use_half_precision = true
max_grad_norm = 1
checkpoint_freq = 25
eval_freq = 20
print_freq = 1
debug_ix = 20

[training.optimizer]
learning_rate = 0.00001
weight_decay = 0.00001

[training.scheduler]
milestones = [100, 200]
gamma = 0.1
# steps_per_epoch = 218
# pct_start = 0.05
# cycle_momentum = false

[training.losses]
gamma = 0.8
pixel_thresh = 12
delta = 6
use_huber = false

# weights for computing total loss 
vis_loss_weight = 2
conf_loss_weight = 1
coords_loss_weight = 0.05
